name: Update OpenAPI from API2Cart

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-openapi:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # รรรรรรร, รฎรฒรฐรจรฌรณยบ รขรฑรพ ยณรฑรฒรฎรฐยณรพ, ร  รญรฅ รฒยณรซรผรชรจ รฎรฑรฒร รญรญยณรฉ รชรฎรฌยณรฒ

      - name: Pull remote changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          # รยณรครฒรฟรฃรณยบรฌรฎ รฎรญรฎรขรซรฅรญรญรฟ, รฟรชรนรฎ รฏร รฐร รซรฅรซรผรญรฎ รกรณรซรจ รญรฎรขยณ รชรฎรฌยณรฒรจ รข master
          git pull --rebase origin master

      - name: Fetch openapi files
        run: |
          # รร รธยณ curl รครซรฟ รงร รขร รญรฒร รฆรฅรญรญรฟ รดร รฉรซยณรข
          echo "curl -fSLo openapi.json https://app.api2cart.com/openapi/openapi.json"
            # รร รขร รญรฒร รฆรณยบรฌรฎ รฌรฎรขรญยณ openapi-รดร รฉรซรจ
          curl -fSLo de/openapi.json https://app.api2cart.com/openapi/de_openapi.json
          curl -fSLo es/openapi.json https://app.api2cart.com/openapi/es_openapi.json
          curl -fSLo it/openapi.json https://app.api2cart.com/openapi/it_openapi.json
          curl -fSLo fr/openapi.json https://app.api2cart.com/openapi/fr_openapi.json
          curl -fSLo openapi.json https://app.api2cart.com/openapi/openapi.json
          # ... รฒรฎรนรฎ

      - name: Commit changes
        run: |
          # รรฅรฐรฅรขยณรฐรฟยบรฌรฎ, รทรจ ยบ รงรฌยณรญรจ, ยณ รชรฎรฌยณรฒรจรฌรฎ
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Update openapi.json automatically"
          else
            echo "No changes to commit."
          fi

      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          branch: master
          github_token: ${{ secrets.GITHUB_TOKEN }}
